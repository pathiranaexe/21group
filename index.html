<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teammate Thought Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #020617;
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0, transparent 50%);
            background-attachment: fixed;
            display: flex;
            position: relative;
            overflow-x: hidden;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(56, 189, 248, 0.03) 50px),
                        repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(56, 189, 248, 0.03) 50px);
            background-size: 50px 50px;
            animation: moveLines 20s linear infinite;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        @keyframes moveLines {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
            width: 90%;
            max-width: 500px;
            color: #fff;
            position: relative;
            margin: 2rem 0;
            z-index: 1;
        }
        h2 { 
            font-family: 'Space Grotesk', sans-serif;
            color: #fff; 
            text-align: center; 
            margin-top: 0;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }
        .input-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        select, input, button {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 13px;
            outline: none;
            background: rgba(30, 58, 138, 0.3);
            color: white;
            transition: all 0.3s ease;
        }
        input::placeholder { color: rgba(147, 197, 253, 0.5); font-weight: bold; }
        input:focus, select:focus { 
            border-color: #38bdf8; 
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        button {
            background: linear-gradient(45deg, #38bdf8, #8b5cf6);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        button:hover { 
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(69, 233, 192, 0.5);
        }
        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }
        li {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            border-left: 2px solid rgba(56, 189, 248, 0.5);
            font-size: 13.5px;
            animation: fadeIn 0.3s ease;
            color: #fff;
            box-shadow: none;
        }
        
        .teammate-name { font-weight: bold; color: #38bdf8; margin-right: 8px; }
        .timestamp { font-size: 10px; color: rgba(255, 255, 255, 0.4); margin-left: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        li.old-thought {
            opacity: 0.7;
            font-size: 0.9em;
            border-left-color: rgba(56, 189, 248, 0.3);
        }
        
        select option {
            background-color: #16213e;
            color: #fff;
            border-radius: 12px;
        }
        
        .menu-container { position: relative; }
        .menu-btn { 
            background: transparent; 
            color: inherit; 
            border: none; 
            cursor: pointer; 
            font-size: 18px; 
            padding: 0 5px;
            box-shadow: none !important;
        }
        .menu-content {
            display: none;
            position: absolute;
            right: 0;
            background: #0f172a;
            border: 1px solid #38bdf8;
            border-radius: 8px;
            z-index: 10;
            min-width: 80px;
        }
        .menu-content button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 0;
        }
        .menu-content button:hover { background: #444; }

        header, footer {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            color: #38bdf8;
            text-align: center;
            padding: 0.4rem 0;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            font-size: 10px;
        }
        header { border-bottom: none; border-top: 1px solid rgba(255, 255, 255, 0.05); opacity: 0.6; }
        footer { border-bottom: none; border-top: 1px solid rgba(255, 255, 255, 0.05); margin-top: auto; opacity: 0.6; }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
                margin: 1rem 0;
            }
            h2 { font-size: 1.5rem; }
            select, input, button {
                font-size: 16px; /* Prevents iOS zoom on focus */
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header> UNIVERSITY OF COLOMBO SCHOOL OF COMPUTING</header>
    <div class="container">
        <h2 style="opacity: 0.8; font-weight: 800;">Teammate <span style="color: #38bdf8; font-family: 'Space Grotesk', sans-serif;">Thought Tracker</span></h2>
        <div class="input-group">
            <select id="teammate">
                <option value="" disabled selected>Select a teammate</option>
                <option value="Dasith">Dasith</option>
                <option value="Shamal">Shamal</option>
                <option value="Sakith">Sakith</option>
                <option value="Vismi">Vismi</option>
                <option value="Uvindu">Uvindu</option>
                <option value="Supun">Supun</option>
                <option value="Pathirana">Pathirana</option>
                <option value="Mariyam">Mariyam</option>
            </select>
            <input type="text" id="thought" placeholder="What are you thinking?" onkeypress="if(event.key === 'Enter') addThought()">
            <button onclick="addThought()" style="background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); color: #38bdf8; box-shadow: none;">Add Thought</button>
            <button onclick="clearAll()" style="background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #fca5a5; align-self: flex-end; font-size: 11px; padding: 5px 10px; box-shadow: none;">Clear</button>
        </div>
        <ul id="thought-list"><li style="justify-content: center; opacity: 0.5; border: none;">No thoughts shared yet...</li></ul>
    </div>
    <footer>GROUP21 &copy; Orientation 2026 </footer>

    <script>
        function toggleMenu(btn) {
            const menu = btn.nextElementSibling;
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function editThought(btn) {
            const li = btn.closest('li');
            const textSpan = li.querySelector('.thought-text');
            const currentText = textSpan.innerText;
            const newText = prompt("Edit thought:", currentText);
            if (newText !== null && newText.trim() !== "") {
                textSpan.innerText = newText;
            }
            btn.parentElement.style.display = 'none';
        }

        function addThought() {
            const name = document.getElementById('teammate').value;
            const thought = document.getElementById('thought').value;
            const list = document.getElementById('thought-list');

            // Remove placeholder if it exists
            if (list.innerText.includes("No thoughts shared yet")) {
                list.innerHTML = "";
            }

            if (thought.trim() === "") {
                alert("Please enter a thought!");
                return;
            }

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const li = document.createElement('li');
            li.innerHTML = `
                <span><span class="teammate-name">${name}:</span> <span class="thought-text">${thought}</span>
                <span class="timestamp">${time}</span></span>
                <div class="menu-container">
                    <button class="menu-btn" onclick="toggleMenu(this)">&#8942;</button>
                    <div class="menu-content">
                        <button onclick="editThought(this)">Edit</button>
                        <button onclick="this.closest('li').remove()">Delete</button>
                    </div>
                </div>
            `;
            
            list.appendChild(li);
            document.getElementById('thought').value = "";
        }

        function deleteSelected() {
            const checkboxes = document.querySelectorAll('.thought-checkbox:checked');
            if (checkboxes.length === 0) {
                alert("Please select thoughts to delete.");
                return;
            }
            if (confirm(`Delete ${checkboxes.length} selected thought(s)?`)) {
                checkboxes.forEach(cb => cb.closest('li').remove());
            }
        }

        function clearAll() {
            if (confirm("Are you sure you want to clear all thoughts?")) {
                document.getElementById('thought-list').innerHTML = '<li style="justify-content: center; opacity: 0.5; border: none;">No thoughts shared yet...</li>';
            }
        }
    </script>
</body>

    </script>
</html>
